##############################
### WINDOWS AND WORKSPACES ###
##############################

# See https://wiki.hypr.land/Configuring/Window-Rules/ for more
# See https://wiki.hypr.land/Configuring/Workspace-Rules/ for workspace rules

# Example windowrules that are useful

windowrule {
    # Ignore maximize requests from all apps. You'll probably like this.
    name = suppress-maximize-events
    match:class = .*

    suppress_event = maximize
}

windowrule {
    # Fix some dragging issues with XWayland
    name = fix-xwayland-drags
    match:class = ^$
    match:title = ^$
    match:xwayland = true
    match:float = true
    match:fullscreen = false
    match:pin = false

    no_focus = true
}

# Hyprland-run windowrule
windowrule {
    name = move-hyprland-run

    match:class = hyprland-run

    move = 20 monitor_h-120
    float = yes
}

windowrule {
    name = FloatTools
    match:class = ^(org.gnome.NautilusPreviewer)$
    float = on
    center = on
    size = 800 500
}
windowrule {
    name = PolkitPopup
    match:class = ^(org.hyprland.polkit-agent)$
    float = on
    center = on
    pin = on
}

layerrule = match:namespace swaync-control-center, blur on
layerrule = match:namespace swaync-control-center, ignore_alpha 0.5

layerrule = match:namespace swaync-notification-window, blur on
layerrule = match:namespace swaync-notification-window, ignore_alpha 0.5
windowrule {
  name = apply-something
  match:class = io.bassi.Amberol
  size = 500 500
}
windowrule = float on, match:class io.bassi.Amberol
windowrule = workspace special silent, match:class io.bassi.Amberol
